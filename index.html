<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Vision - Inverse Harmony</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background: #000;
        }
        
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 50;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #00ff00;
            border-radius: 15px;
            padding: 20px;
            color: #00ff00;
            font-size: 13px;
            max-width: 360px;
            font-weight: bold;
            max-height: 95vh;
            overflow-y: auto;
        }
        
        .title {
            font-size: 16px;
            margin-bottom: 10px;
            text-align: center;
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00;
        }
        
        .subtitle {
            font-size: 11px;
            text-align: center;
            color: #00ffff;
            margin-bottom: 15px;
            font-style: italic;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button.active {
            background: #ff0000;
        }
        
        .section {
            margin-bottom: 12px;
            padding: 12px;
            border: 2px solid #00ffff;
            border-radius: 8px;
            background: rgba(0, 255, 255, 0.05);
        }
        
        .section-title {
            color: #ffff00;
            font-size: 12px;
            margin-bottom: 8px;
            font-weight: bold;
        }
        
        .freq-pair {
            display: flex;
            align-items: center;
            margin-bottom: 8px;
            gap: 8px;
        }
        
        .freq-input {
            flex: 1;
            text-align: center;
            padding: 6px;
            border: 1px solid #ff3300;
            border-radius: 4px;
            background: rgba(255, 51, 0, 0.1);
            color: #ff3300;
            font-size: 11px;
        }
        
        .freq-arrow {
            color: #00ff00;
            font-size: 16px;
        }
        
        .freq-output {
            flex: 1;
            text-align: center;
            padding: 6px;
            border: 1px solid #0080ff;
            border-radius: 4px;
            background: rgba(0, 128, 255, 0.1);
            color: #0080ff;
            font-size: 11px;
        }
        
        .bar-container {
            display: flex;
            align-items: flex-end;
            height: 40px;
            gap: 2px;
        }
        
        .bar {
            flex: 1;
            border-radius: 2px;
            min-height: 3px;
        }
        
        .bar.bass { background: #ff3300; }
        .bar.mid { background: #ffff00; }
        .bar.treble { background: #0080ff; }
        
        .info {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ff00ff;
            border-radius: 5px;
            font-size: 11px;
            color: #ff00ff;
        }
        
        .volume-control {
            margin-top: 8px;
        }
        
        input[type="range"] {
            width: 100%;
        }
    </style>
</head>
<body>
    <video id="camera-feed"></video>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div class="title">🎵 FREQUENCY VISION 🎵</div>
        <div class="subtitle">↔️ Inverse Harmony Response</div>
        <button id="mic-btn">🎤 Mikrofon starten</button>
        
        <div class="section">
            <div class="section-title">📊 Dein Input → Handy Output</div>
            
            <div class="freq-pair">
                <div class="freq-input">
                    <div style="font-size: 10px;">BASS</div>
                    <div id="bass-input">0</div>
                </div>
                <div class="freq-arrow">⇄</div>
                <div class="freq-output">
                    <div style="font-size: 10px;">TREBLE</div>
                    <div id="treble-output">0</div>
                </div>
            </div>
            
            <div class="freq-pair">
                <div class="freq-input">
                    <div style="font-size: 10px;">MID</div>
                    <div id="mid-input">0</div>
                </div>
                <div class="freq-arrow">↕️</div>
                <div class="freq-output">
                    <div style="font-size: 10px;">MID</div>
                    <div id="mid-output">0</div>
                </div>
            </div>
            
            <div class="freq-pair">
                <div class="freq-input">
                    <div style="font-size: 10px;">TREBLE</div>
                    <div id="treble-input">0</div>
                </div>
                <div class="freq-arrow">⇄</div>
                <div class="freq-output">
                    <div style="font-size: 10px;">BASS</div>
                    <div id="bass-output">0</div>
                </div>
            </div>
        </div>
        
        <div class="section">
            <div class="section-title">🎚️ Output Lautstärke</div>
            <input type="range" id="volume-control" min="0" max="100" value="30" style="width: 100%;">
            <div style="font-size: 10px; color: #00ffff; margin-top: 5px;">
                Level: <span id="volume-display">30</span>%
            </div>
        </div>
        
        <div id="info" class="info">
            Status: 🟢 Bereit
        </div>
    </div>

    <script>
        // Camera
        async function startCamera() {
            const video = document.getElementById('camera-feed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.play();
            } catch (e) {
                console.error('Kamera-Fehler:', e);
            }
        }
        
        startCamera();
        
        // Audio Setup
        let audioContext = null;
        let inputAnalyser = null;
        let inputFrequencyData = null;
        let isListening = false;
        
        // Synthesis Oscillators
        let oscillators = {
            bass: null,
            mid: null,
            treble: null
        };
        
        let gains = {
            bass: null,
            mid: null,
            treble: null
        };
        
        let masterGain = null;
        
        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                
                // Input Analyser
                inputAnalyser = audioContext.createAnalyser();
                inputAnalyser.fftSize = 256;
                inputAnalyser.smoothingTimeConstant = 0.8;
                inputFrequencyData = new Uint8Array(inputAnalyser.frequencyBinCount);
                
                // Create synthesis nodes
                masterGain = audioContext.createGain();
                masterGain.connect(audioContext.destination);
                masterGain.gain.value = 0.3;
                
                // Bass Oscillator (25 Hz - 100 Hz)
                oscillators.bass = audioContext.createOscillator();
                oscillators.bass.frequency.value = 60;
                gains.bass = audioContext.createGain();
                oscillators.bass.connect(gains.bass);
                gains.bass.connect(masterGain);
                oscillators.bass.start();
                
                // Mid Oscillator (400 Hz)
                oscillators.mid = audioContext.createOscillator();
                oscillators.mid.frequency.value = 400;
                gains.mid = audioContext.createGain();
                oscillators.mid.connect(gains.mid);
                gains.mid.connect(masterGain);
                oscillators.mid.start();
                
                // Treble Oscillator (2000 Hz - 4000 Hz)
                oscillators.treble = audioContext.createOscillator();
                oscillators.treble.frequency.value = 3000;
                oscillators.treble.type = 'sine';
                gains.treble = audioContext.createGain();
                oscillators.treble.connect(gains.treble);
                gains.treble.connect(masterGain);
                oscillators.treble.start();
                
                // Get input stream
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(inputAnalyser);
                
                isListening = true;
                document.getElementById('mic-btn').classList.add('active');
                document.getElementById('mic-btn').textContent = '🎤 Aktiv!';
                document.getElementById('info').innerHTML = '🟢 <span style="color: #00ff00;">Musik wird analysiert & Gegenfrequenz ausgegeben!</span>';
            } catch (e) {
                console.error('Audio Error:', e);
                document.getElementById('info').innerHTML = '🔴 Audio-Fehler';
            }
        }
        
        document.getElementById('mic-btn').addEventListener('click', startAudio);
        
        // Volume Control
        document.getElementById('volume-control').addEventListener('input', (e) => {
            const vol = e.target.value / 100;
            if (masterGain) masterGain.gain.value = vol * 0.5;
            document.getElementById('volume-display').textContent = e.target.value;
        });
        
        // Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('canvas'), 
            antialias: true, 
            alpha: true 
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0.0);
        camera.position.z = 15;
        
        // Lighting
        const light = new THREE.PointLight(0xffffff, 1.2);
        light.position.set(0, 0, 20);
        scene.add(light);
        
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        // Create visualization bars
        const barGroups = {
            input: { bass: [], mid: [], treble: [], color: 0xff3300, x: -8 },
            output: { bass: [], mid: [], treble: [], color: 0x0080ff, x: 8 }
        };
        
        function createBars(color, startX) {
            const group = { bass: [], mid: [], treble: [] };
            const freqTypes = ['bass', 'mid', 'treble'];
            const freqColors = [0xff3300, 0xffff00, 0x0080ff];
            
            freqTypes.forEach((type, typeIdx) => {
                for (let i = 0; i < 4; i++) {
                    const geometry = new THREE.BoxGeometry(0.8, 0.3, 0.5);
                    const material = new THREE.MeshPhongMaterial({
                        color: freqColors[typeIdx],
                        emissive: freqColors[typeIdx],
                        transparent: true,
                        opacity: 0.8
                    });
                    const mesh = new THREE.Mesh(geometry, material);
                    
                    mesh.position.x = startX;
                    mesh.position.y = (typeIdx - 1) * 3;
                    mesh.position.z = i * 1;
                    
                    mesh.userData = { currentHeight: 0.3, targetHeight: 0.3 };
                    
                    scene.add(mesh);
                    group[type].push(mesh);
                }
            });
            
            return group;
        }
        
        barGroups.input = createBars(0xff3300, -8);
        barGroups.output = createBars(0x0080ff, 8);
        
        // Update visualization
        function updateVisualization() {
            if (!isListening || !inputAnalyser) return;
            
            inputAnalyser.getByteFrequencyData(inputFrequencyData);
            const dataLength = inputFrequencyData.length;
            
            // Calculate frequency bands
            const bassEnd = Math.floor(dataLength * 0.25);
            const midEnd = Math.floor(dataLength * 0.75);
            
            let bassValue = 0, midValue = 0, trebleValue = 0;
            
            // Bass
            for (let i = 0; i < bassEnd; i++) {
                bassValue += inputFrequencyData[i];
            }
            bassValue = (bassValue / bassEnd) / 255;
            
            // Mid
            for (let i = bassEnd; i < midEnd; i++) {
                midValue += inputFrequencyData[i];
            }
            midValue = (midValue / (midEnd - bassEnd)) / 255;
            
            // Treble
            for (let i = midEnd; i < dataLength; i++) {
                trebleValue += inputFrequencyData[i];
            }
            trebleValue = (trebleValue / (dataLength - midEnd)) / 255;
            
            // Update UI values
            document.getElementById('bass-input').textContent = (bassValue * 100).toFixed(0);
            document.getElementById('mid-input').textContent = (midValue * 100).toFixed(0);
            document.getElementById('treble-input').textContent = (trebleValue * 100).toFixed(0);
            
            // INVERSE: High input = Low output
            const invertedBass = Math.max(0.01, 1 - bassValue);
            const invertedMid = Math.max(0.01, 1 - midValue);
            const invertedTreble = Math.max(0.01, 1 - trebleValue);
            
            // Update output UI
            document.getElementById('treble-output').textContent = (bassValue * 100).toFixed(0);
            document.getElementById('mid-output').textContent = (midValue * 100).toFixed(0);
            document.getElementById('bass-output').textContent = (trebleValue * 100).toFixed(0);
            
            // Update oscillators (inverse mapping)
            gains.treble.gain.setValueAtTime(bassValue * 0.3, audioContext.currentTime);
            gains.mid.gain.setValueAtTime(midValue * 0.2, audioContext.currentTime);
            gains.bass.gain.setValueAtTime(trebleValue * 0.3, audioContext.currentTime);
            
            // Update visualization bars
            barGroups.input.bass.forEach((bar, i) => {
                const h = Math.max(0.1, bassValue * 4);
                bar.userData.targetHeight = h;
                bar.scale.y = bar.userData.targetHeight;
            });
            
            barGroups.input.mid.forEach((bar, i) => {
                const h = Math.max(0.1, midValue * 4);
                bar.userData.targetHeight = h;
                bar.scale.y = bar.userData.targetHeight;
            });
            
            barGroups.input.treble.forEach((bar, i) => {
                const h = Math.max(0.1, trebleValue * 4);
                bar.userData.targetHeight = h;
                bar.scale.y = bar.userData.targetHeight;
            });
            
            barGroups.output.bass.forEach((bar, i) => {
                const h = Math.max(0.1, trebleValue * 4);
                bar.userData.targetHeight = h;
                bar.scale.y = bar.userData.targetHeight;
            });
            
            barGroups.output.mid.forEach((bar, i) => {
                const h = Math.max(0.1, midValue * 4);
                bar.userData.targetHeight = h;
                bar.scale.y = bar.userData.targetHeight;
            });
            
            barGroups.output.treble.forEach((bar, i) => {
                const h = Math.max(0.1, bassValue * 4);
                bar.userData.targetHeight = h;
                bar.scale.y = bar.userData.targetHeight;
            });
        }
        
        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            updateVisualization();
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
