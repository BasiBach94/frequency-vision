<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Vision - Audio Spectrum</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background: #000;
        }
        
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 50;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #00ff00;
            border-radius: 15px;
            padding: 20px;
            color: #00ff00;
            font-size: 13px;
            max-width: 320px;
            font-weight: bold;
        }
        
        .title {
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00, 0 0 30px #00ff00;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px #00ff00;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        button.active {
            background: #ff0000;
            box-shadow: 0 0 30px #ff0000;
        }
        
        .freq-display {
            margin-top: 15px;
            padding: 12px;
            border: 2px solid #00ffff;
            border-radius: 8px;
            background: rgba(0, 255, 255, 0.05);
        }
        
        .freq-label {
            color: #00ffff;
            margin-bottom: 5px;
        }
        
        .freq-bars {
            display: flex;
            gap: 2px;
            margin: 8px 0;
        }
        
        .freq-bar {
            flex: 1;
            height: 20px;
            background: linear-gradient(180deg, #00ff00, #ffff00, #ff0000);
            border-radius: 2px;
            opacity: 0.7;
        }
        
        .info {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ff00ff;
            border-radius: 5px;
            font-size: 11px;
            color: #ff00ff;
        }
    </style>
</head>
<body>
    <video id="camera-feed"></video>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div class="title">🎵 FREQUENCY VISION 🎵</div>
        <button id="mic-btn">🎤 Mikrofon starten</button>
        <div class="freq-display">
            <div class="freq-label">📊 Frequenz-Spektrum:</div>
            <div class="freq-bars">
                <div class="freq-bar" id="bar-0"></div>
                <div class="freq-bar" id="bar-1"></div>
                <div class="freq-bar" id="bar-2"></div>
                <div class="freq-bar" id="bar-3"></div>
                <div class="freq-bar" id="bar-4"></div>
                <div class="freq-bar" id="bar-5"></div>
                <div class="freq-bar" id="bar-6"></div>
                <div class="freq-bar" id="bar-7"></div>
            </div>
            <div style="display: flex; justify-content: space-between; font-size: 10px; color: #00ffff; margin-top: 5px;">
                <span>Bass</span>
                <span>Mid</span>
                <span>Treble</span>
            </div>
        </div>
        <div id="info" class="info">
            Status: 🟢 Bereit
        </div>
    </div>

    <script>
        // Camera
        async function startCamera() {
            const video = document.getElementById('camera-feed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.play();
            } catch (e) {
                console.error('Kamera-Fehler:', e);
            }
        }
        
        startCamera();
        
        // Audio Setup
        let audioContext = null;
        let analyser = null;
        let frequencyData = null;
        let isListening = false;
        
        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.85;
                frequencyData = new Uint8Array(analyser.frequencyBinCount);
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                isListening = true;
                document.getElementById('mic-btn').classList.add('active');
                document.getElementById('mic-btn').textContent = '🎤 Mikrofon aktiv!';
                document.getElementById('info').innerHTML = 'Status: 🟢 <span style="color: #00ff00;">MUSIK WIRD VISUALISIERT!</span>';
            } catch (e) {
                console.error('Audio Error:', e);
                document.getElementById('info').innerHTML = 'Status: 🔴 Mikrofon-Fehler';
            }
        }
        
        document.getElementById('mic-btn').addEventListener('click', startAudio);
        
        // Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('canvas'), 
            antialias: true, 
            alpha: true 
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0.0);
        camera.position.z = 10;
        
        // Lighting
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        // Create Audio Spectrum Visualizer
        const spectrumBars = [];
        const barCount = 64;
        const barWidth = 0.15;
        const barGap = 0.02;
        
        for (let i = 0; i < barCount; i++) {
            const geometry = new THREE.BoxGeometry(barWidth, 1, barWidth);
            const hue = i / barCount;
            const color = new THREE.Color().setHSL(hue, 1, 0.5);
            const material = new THREE.MeshPhongMaterial({
                color,
                emissive: color,
                transparent: true,
                opacity: 0.8
            });
            const mesh = new THREE.Mesh(geometry, material);
            
            const totalWidth = (barWidth + barGap) * barCount;
            mesh.position.x = (i * (barWidth + barGap)) - totalWidth / 2;
            mesh.position.y = 0;
            
            mesh.userData = {
                baseHeight: 0.1,
                currentHeight: 0.1,
                targetHeight: 0.1,
                smoothing: 0.2
            };
            
            scene.add(mesh);
            spectrumBars.push(mesh);
        }
        
        // Waveform Circle (outer ring)
        const waveformGeometry = new THREE.BufferGeometry();
        const points = [];
        for (let i = 0; i < 128; i++) {
            const angle = (i / 128) * Math.PI * 2;
            points.push(new THREE.Vector3(Math.cos(angle) * 5, Math.sin(angle) * 5, 0));
        }
        const lineMaterial = new THREE.LineBasicMaterial({ color: 0x00ff00, linewidth: 2 });
        const waveform = new THREE.Line(waveformGeometry, lineMaterial);
        scene.add(waveform);
        
        // Update spectrum bars
        function updateSpectrum() {
            if (!isListening || !analyser) return;
            
            analyser.getByteFrequencyData(frequencyData);
            
            // Update 3D bars
            spectrumBars.forEach((bar, i) => {
                const index = Math.floor((i / spectrumBars.length) * frequencyData.length);
                const value = frequencyData[index] / 255;
                
                bar.userData.targetHeight = Math.max(0.1, value * 8);
                bar.userData.currentHeight += (bar.userData.targetHeight - bar.userData.currentHeight) * bar.userData.smoothing;
                
                bar.scale.y = bar.userData.currentHeight;
                bar.position.y = bar.userData.currentHeight / 2;
                
                // Glow effect
                bar.material.opacity = 0.5 + value * 0.5;
            });
            
            // Update UI bars
            for (let i = 0; i < 8; i++) {
                const index = Math.floor((i / 8) * frequencyData.length);
                const value = frequencyData[index] / 255;
                const bar = document.getElementById(`bar-${i}`);
                if (bar) {
                    bar.style.height = (20 + value * 60) + 'px';
                    bar.style.opacity = 0.5 + value * 0.5;
                }
            }
            
            // Update waveform circle
            const positions = [];
            for (let i = 0; i < 128; i++) {
                const angle = (i / 128) * Math.PI * 2;
                const dataIndex = Math.floor((i / 128) * frequencyData.length);
                const value = frequencyData[dataIndex] / 255;
                const radius = 5 + value * 3;
                positions.push(
                    Math.cos(angle) * radius,
                    Math.sin(angle) * radius,
                    0
                );
            }
            waveformGeometry.setAttribute('position', new THREE.BufferAttribute(new Float32Array(positions), 3));
        }
        
        // Rotation effect
        let rotationAngle = 0;
        
        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            updateSpectrum();
            
            // Rotate entire spectrum
            rotationAngle += 0.0003;
            scene.rotation.z = rotationAngle;
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
