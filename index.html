<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Vision - Audio Spectrum</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background: #000;
        }
        
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 50;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #00ff00;
            border-radius: 15px;
            padding: 20px;
            color: #00ff00;
            font-size: 13px;
            max-width: 340px;
            font-weight: bold;
        }
        
        .title {
            font-size: 16px;
            margin-bottom: 15px;
            text-align: center;
            color: #00ff00;
            text-shadow: 0 0 15px #00ff00;
        }
        
        button {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            background: linear-gradient(135deg, #00ff00, #00cc00);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }
        
        button:hover {
            transform: scale(1.05);
        }
        
        button.active {
            background: #ff0000;
        }
        
        .freq-section {
            margin-bottom: 12px;
            padding: 10px;
            border: 2px solid #00ffff;
            border-radius: 8px;
            background: rgba(0, 255, 255, 0.05);
        }
        
        .freq-name {
            color: #ffff00;
            font-size: 12px;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .freq-bar-container {
            display: flex;
            align-items: flex-end;
            height: 60px;
            gap: 2px;
        }
        
        .freq-bar {
            flex: 1;
            background: linear-gradient(180deg, #ff0000, #ffff00);
            border-radius: 2px;
            min-height: 5px;
        }
        
        .freq-bar.bass {
            background: linear-gradient(180deg, #ff0000, #ff6600);
        }
        
        .freq-bar.mid {
            background: linear-gradient(180deg, #ffff00, #00ff00);
        }
        
        .freq-bar.treble {
            background: linear-gradient(180deg, #00ffff, #0080ff);
        }
        
        .info {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ff00ff;
            border-radius: 5px;
            font-size: 11px;
            color: #ff00ff;
        }
    </style>
</head>
<body>
    <video id="camera-feed"></video>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div class="title">🎵 FREQUENCY VISION 🎵</div>
        <button id="mic-btn">🎤 Musik starten</button>
        
        <div class="freq-section">
            <div class="freq-name">🔴 BASS (tiefe Töne)</div>
            <div class="freq-bar-container">
                <div class="freq-bar bass" id="bass-1"></div>
                <div class="freq-bar bass" id="bass-2"></div>
                <div class="freq-bar bass" id="bass-3"></div>
                <div class="freq-bar bass" id="bass-4"></div>
            </div>
        </div>
        
        <div class="freq-section">
            <div class="freq-name">🟡 MID (mittlere Töne)</div>
            <div class="freq-bar-container">
                <div class="freq-bar mid" id="mid-1"></div>
                <div class="freq-bar mid" id="mid-2"></div>
                <div class="freq-bar mid" id="mid-3"></div>
                <div class="freq-bar mid" id="mid-4"></div>
            </div>
        </div>
        
        <div class="freq-section">
            <div class="freq-name">🔵 TREBLE (hohe Töne)</div>
            <div class="freq-bar-container">
                <div class="freq-bar treble" id="treble-1"></div>
                <div class="freq-bar treble" id="treble-2"></div>
                <div class="freq-bar treble" id="treble-3"></div>
                <div class="freq-bar treble" id="treble-4"></div>
            </div>
        </div>
        
        <div id="info" class="info">
            Status: 🟢 Bereit für Musik
        </div>
    </div>

    <script>
        // Camera
        async function startCamera() {
            const video = document.getElementById('camera-feed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.play();
            } catch (e) {
                console.error('Kamera-Fehler:', e);
            }
        }
        
        startCamera();
        
        // Audio Setup
        let audioContext = null;
        let analyser = null;
        let frequencyData = null;
        let isListening = false;
        
        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                analyser.smoothingTimeConstant = 0.8;
                frequencyData = new Uint8Array(analyser.frequencyBinCount);
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                isListening = true;
                document.getElementById('mic-btn').classList.add('active');
                document.getElementById('mic-btn').textContent = '🎤 Aktiv!';
                document.getElementById('info').innerHTML = '🟢 <span style="color: #00ff00;">Musik wird analysiert!</span>';
            } catch (e) {
                console.error('Audio Error:', e);
                document.getElementById('info').innerHTML = '🔴 Mikrofon-Fehler';
            }
        }
        
        document.getElementById('mic-btn').addEventListener('click', startAudio);
        
        // Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('canvas'), 
            antialias: true, 
            alpha: true 
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0.0);
        camera.position.z = 15;
        
        // Lighting
        const light = new THREE.PointLight(0xffffff, 1.2);
        light.position.set(0, 0, 20);
        scene.add(light);
        
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        // Create THREE frequency bars (BASS, MID, TREBLE)
        const freqGroups = {
            bass: { bars: [], color: 0xff3300, startX: -6 },
            mid: { bars: [], color: 0xffff00, startX: -2 },
            treble: { bars: [], color: 0x0080ff, startX: 2 }
        };
        
        function createBars(group, color, startX) {
            const bars = [];
            for (let i = 0; i < 4; i++) {
                const geometry = new THREE.BoxGeometry(1.2, 0.5, 0.5);
                const material = new THREE.MeshPhongMaterial({
                    color,
                    emissive: color,
                    transparent: true,
                    opacity: 0.8
                });
                const mesh = new THREE.Mesh(geometry, material);
                
                mesh.position.x = startX + i * 1.3;
                mesh.position.y = 0;
                mesh.position.z = 0;
                
                mesh.userData = {
                    baseHeight: 0.5,
                    currentHeight: 0.5,
                    targetHeight: 0.5,
                    smoothing: 0.15
                };
                
                scene.add(mesh);
                bars.push(mesh);
            }
            return bars;
        }
        
        freqGroups.bass.bars = createBars('bass', 0xff3300, -6);
        freqGroups.mid.bars = createBars('mid', 0xffff00, -2);
        freqGroups.treble.bars = createBars('treble', 0x0080ff, 2);
        
        // Update spectrum
        function updateSpectrum() {
            if (!isListening || !analyser) return;
            
            analyser.getByteFrequencyData(frequencyData);
            
            const dataLength = frequencyData.length;
            
            // BASS (0-25% of spectrum)
            const bassEnd = Math.floor(dataLength * 0.25);
            freqGroups.bass.bars.forEach((bar, i) => {
                const start = Math.floor(bassEnd * (i / 4));
                const end = Math.floor(bassEnd * ((i + 1) / 4));
                let sum = 0;
                for (let j = start; j < end; j++) {
                    sum += frequencyData[j];
                }
                const avg = sum / (end - start) / 255;
                
                bar.userData.targetHeight = Math.max(0.2, avg * 8);
                bar.userData.currentHeight += (bar.userData.targetHeight - bar.userData.currentHeight) * bar.userData.smoothing;
                bar.scale.y = bar.userData.currentHeight;
                bar.position.y = bar.userData.currentHeight / 2;
                
                // Update UI
                const uiBar = document.getElementById(`bass-${i + 1}`);
                if (uiBar) uiBar.style.height = (20 + avg * 60) + 'px';
            });
            
            // MID (25-75% of spectrum)
            const midStart = bassEnd;
            const midEnd = Math.floor(dataLength * 0.75);
            freqGroups.mid.bars.forEach((bar, i) => {
                const start = Math.floor(midStart + (midEnd - midStart) * (i / 4));
                const end = Math.floor(midStart + (midEnd - midStart) * ((i + 1) / 4));
                let sum = 0;
                for (let j = start; j < end; j++) {
                    sum += frequencyData[j];
                }
                const avg = sum / (end - start) / 255;
                
                bar.userData.targetHeight = Math.max(0.2, avg * 8);
                bar.userData.currentHeight += (bar.userData.targetHeight - bar.userData.currentHeight) * bar.userData.smoothing;
                bar.scale.y = bar.userData.currentHeight;
                bar.position.y = bar.userData.currentHeight / 2;
                
                const uiBar = document.getElementById(`mid-${i + 1}`);
                if (uiBar) uiBar.style.height = (20 + avg * 60) + 'px';
            });
            
            // TREBLE (75-100% of spectrum)
            const trebleStart = midEnd;
            freqGroups.treble.bars.forEach((bar, i) => {
                const start = Math.floor(trebleStart + (dataLength - trebleStart) * (i / 4));
                const end = Math.floor(trebleStart + (dataLength - trebleStart) * ((i + 1) / 4));
                let sum = 0;
                for (let j = start; j < end; j++) {
                    sum += frequencyData[j];
                }
                const avg = sum / (end - start) / 255;
                
                bar.userData.targetHeight = Math.max(0.2, avg * 8);
                bar.userData.currentHeight += (bar.userData.targetHeight - bar.userData.currentHeight) * bar.userData.smoothing;
                bar.scale.y = bar.userData.currentHeight;
                bar.position.y = bar.userData.currentHeight / 2;
                
                const uiBar = document.getElementById(`treble-${i + 1}`);
                if (uiBar) uiBar.style.height = (20 + avg * 60) + 'px';
            });
        }
        
        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            updateSpectrum();
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
