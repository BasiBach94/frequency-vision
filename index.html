<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Vision - Real Sensor AR</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Courier New', monospace;
            overflow: hidden;
            background: #000;
        }
        
        #camera-feed {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            object-fit: cover;
        }
        
        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 50;
        }
        
        #ui {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            background: rgba(0, 0, 0, 0.95);
            border: 2px solid #00ff00;
            border-radius: 10px;
            padding: 15px;
            color: #00ff00;
            font-size: 12px;
            max-width: 300px;
            font-weight: bold;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .title {
            font-size: 14px;
            margin-bottom: 10px;
            text-align: center;
            color: #00ff00;
            text-shadow: 0 0 10px #00ff00;
        }
        
        .sensor-group {
            margin-bottom: 8px;
            padding: 8px;
            border: 1px solid #00ff00;
            border-radius: 5px;
        }
        
        .sensor-name {
            font-size: 11px;
            margin-bottom: 3px;
            color: #00ffff;
        }
        
        .sensor-value {
            font-size: 10px;
            color: #00ff00;
            margin: 2px 0;
        }
        
        button {
            width: 100%;
            padding: 8px;
            margin-top: 10px;
            background: #00ff00;
            color: #000;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <video id="camera-feed"></video>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div class="title">⚡ FREQUENCY VISION ⚡</div>
        <div id="sensors"></div>
        <button id="mic-btn">🎤 Mikrofon</button>
    </div>

    <script>
        // Camera
        async function startCamera() {
            const video = document.getElementById('camera-feed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.play();
            } catch (e) {
                console.error('Kamera-Fehler:', e);
            }
        }
        
        startCamera();
        
        // Sensor Daten
        const sensorData = {
            accelerometer: { x: 0, y: 0, z: 0 },
            gyroscope: { x: 0, y: 0, z: 0 },
            magnetometer: { x: 0, y: 0, z: 0 },
            light: 0,
            temperature: 0,
            pressure: 0,
            battery: 100,
            audio: 0
        };
        
        // Device Motion (Accelerometer + Gyroscope)
        if (window.DeviceMotionEvent) {
            window.addEventListener('devicemotion', (e) => {
                if (e.acceleration) {
                    sensorData.accelerometer = {
                        x: e.acceleration.x || 0,
                        y: e.acceleration.y || 0,
                        z: e.acceleration.z || 0
                    };
                }
                if (e.rotationRate) {
                    sensorData.gyroscope = {
                        x: e.rotationRate.alpha || 0,
                        y: e.rotationRate.beta || 0,
                        z: e.rotationRate.gamma || 0
                    };
                }
            });
        }
        
        // Light Sensor (Generic Sensor API)
        if ('AmbientLightSensor' in window) {
            try {
                const sensor = new AmbientLightSensor();
                sensor.addEventListener('reading', () => {
                    sensorData.light = sensor.illuminance;
                });
                sensor.addEventListener('error', () => {
                    console.warn('Light Sensor nicht verfügbar');
                });
                sensor.start();
            } catch (e) {
                console.warn('Light Sensor Error:', e);
            }
        }
        
        // Barometer (Druck-Sensor)
        if ('RelativeOrientationSensor' in window) {
            try {
                const sensor = new RelativeOrientationSensor();
                sensor.addEventListener('reading', () => {
                    // Sensor Daten vorhanden
                });
                sensor.start();
            } catch (e) {
                console.warn('Orientation Sensor Error:', e);
            }
        }
        
        // Battery Status API
        if (navigator.getBattery) {
            navigator.getBattery().then((battery) => {
                battery.addEventListener('levelchange', () => {
                    sensorData.battery = battery.level * 100;
                });
            });
        }
        
        // Audio für Schallwellen
        let audioContext = null;
        let analyser = null;
        let audioData = null;
        
        async function startAudio() {
            try {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioContext.createAnalyser();
                analyser.fftSize = 256;
                audioData = new Uint8Array(analyser.frequencyBinCount);
                
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioContext.createMediaStreamSource(stream);
                source.connect(analyser);
                
                document.getElementById('mic-btn').textContent = '🎤 Aktiv!';
            } catch (e) {
                console.error('Audio Error:', e);
            }
        }
        
        document.getElementById('mic-btn').addEventListener('click', startAudio);
        
        // Three.js Setup
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ 
            canvas: document.getElementById('canvas'), 
            antialias: true, 
            alpha: true 
        });
        
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        renderer.setClearColor(0x000000, 0.0);
        camera.position.z = 5;
        
        // Lighting
        const light = new THREE.PointLight(0xffffff, 1);
        light.position.set(5, 5, 5);
        scene.add(light);
        
        const ambientLight = new THREE.AmbientLight(0x404040);
        scene.add(ambientLight);
        
        // Create Particles für Sensoren
        const particleGroups = {};
        const colors = {
            accelerometer: 0xff0000,
            gyroscope: 0x00ff00,
            magnetometer: 0x0000ff,
            audio: 0xff00ff,
            light: 0xffff00,
            temperature: 0xff8800,
            pressure: 0x00ffff,
            battery: 0xff0080
        };
        
        // Create particle system für jeden Sensor
        function createSensorVisualizer(name, color) {
            const group = new THREE.Group();
            scene.add(group);
            
            const particles = [];
            const geometry = new THREE.OctahedronGeometry(0.1, 2);
            const material = new THREE.MeshPhongMaterial({
                color,
                emissive: color,
                transparent: true,
                opacity: 0.6
            });
            
            for (let i = 0; i < 30; i++) {
                const mesh = new THREE.Mesh(geometry, material.clone());
                mesh.position.set(
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8,
                    (Math.random() - 0.5) * 8
                );
                mesh.userData = {
                    basePos: mesh.position.clone(),
                    speed: Math.random() * 0.02 + 0.01
                };
                group.add(mesh);
                particles.push(mesh);
            }
            
            return { group, particles };
        }
        
        // Create all visualizers
        Object.keys(colors).forEach(sensor => {
            particleGroups[sensor] = createSensorVisualizer(sensor, colors[sensor]);
        });
        
        // Update particles based on sensor data
        function updateParticles() {
            // Accelerometer - Rotation
            const accel = sensorData.accelerometer;
            if (particleGroups.accelerometer) {
                particleGroups.accelerometer.particles.forEach(p => {
                    p.position.x = p.userData.basePos.x + accel.x * 0.5;
                    p.position.y = p.userData.basePos.y + accel.y * 0.5;
                    p.position.z = p.userData.basePos.z + accel.z * 0.5;
                });
            }
            
            // Gyroscope - Spinning
            if (particleGroups.gyroscope) {
                particleGroups.gyroscope.particles.forEach(p => {
                    p.rotation.x += sensorData.gyroscope.x * 0.01;
                    p.rotation.y += sensorData.gyroscope.y * 0.01;
                    p.rotation.z += sensorData.gyroscope.z * 0.01;
                });
            }
            
            // Light - Scale
            if (particleGroups.light) {
                const lightScale = Math.max(0.5, Math.min(2, sensorData.light / 1000));
                particleGroups.light.particles.forEach(p => {
                    p.scale.set(lightScale, lightScale, lightScale);
                    p.material.opacity = 0.3 + (sensorData.light / 50000);
                });
            }
            
            // Audio - Movement
            if (analyser && audioData) {
                analyser.getByteFrequencyData(audioData);
                if (particleGroups.audio) {
                    particleGroups.audio.particles.forEach((p, i) => {
                        const idx = Math.floor((i / 30) * audioData.length);
                        const val = audioData[idx] / 255;
                        p.position.y = p.userData.basePos.y + val * 2;
                        p.scale.set(0.5 + val, 0.5 + val, 0.5 + val);
                        p.material.opacity = 0.3 + val * 0.5;
                    });
                }
            }
            
            // Battery - Opacity
            if (particleGroups.battery) {
                const batteryAlpha = sensorData.battery / 100;
                particleGroups.battery.particles.forEach(p => {
                    p.material.opacity = 0.2 + batteryAlpha * 0.6;
                });
            }
        }
        
        // Update UI mit Sensor-Werten
        function updateUI() {
            const sensorsDiv = document.getElementById('sensors');
            sensorsDiv.innerHTML = `
                <div class="sensor-group">
                    <div class="sensor-name">📱 Accelerometer</div>
                    <div class="sensor-value">X: ${sensorData.accelerometer.x.toFixed(2)}</div>
                    <div class="sensor-value">Y: ${sensorData.accelerometer.y.toFixed(2)}</div>
                    <div class="sensor-value">Z: ${sensorData.accelerometer.z.toFixed(2)}</div>
                </div>
                <div class="sensor-group">
                    <div class="sensor-name">🔄 Gyroscope</div>
                    <div class="sensor-value">α: ${sensorData.gyroscope.x.toFixed(2)}</div>
                    <div class="sensor-value">β: ${sensorData.gyroscope.y.toFixed(2)}</div>
                    <div class="sensor-value">γ: ${sensorData.gyroscope.z.toFixed(2)}</div>
                </div>
                <div class="sensor-group">
                    <div class="sensor-name">💡 Light</div>
                    <div class="sensor-value">${sensorData.light.toFixed(0)} lux</div>
                </div>
                <div class="sensor-group">
                    <div class="sensor-name">🔋 Battery</div>
                    <div class="sensor-value">${sensorData.battery.toFixed(0)}%</div>
                </div>
            `;
        }
        
        // Animation Loop
        function animate() {
            requestAnimationFrame(animate);
            
            updateParticles();
            updateUI();
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        // Resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
        
        // Permission Request
        if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            document.addEventListener('click', () => {
                DeviceMotionEvent.requestPermission()
                    .then(permissionState => {
                        if (permissionState === 'granted') {
                            console.log('Motion permission granted');
                        }
                    })
                    .catch(console.error);
            }, { once: true });
        }
    </script>
</body>
</html>
